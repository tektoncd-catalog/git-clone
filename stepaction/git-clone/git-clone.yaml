spec:
  description: >-
    This StepAction clones a git repository for use by other steps
    in your Pipeline.
    It clones a repo from the provided url into the
    output path. By default the repo will be cloned into the root of
    the provided path. You can clone into a subdirectory by setting this StepAction's
    subdirectory param. It also supports sparse checkouts. To perform
    a sparse checkout, pass a list of comma separated directory patterns to
    this StepAction's sparseCheckoutDirectories param.
  params:
    - name: output-path
      description: The git repo will be cloned onto this path.
      type: string
    - name: ssh-directory-path
      description: |
        A .ssh directory with private key, known_hosts, config, etc.
      default: ""
    - name: basic-auth-path
      description: |
        A directory path containing a .gitconfig and .git-credentials file.
      default: ""
    - name: ssl-ca-directory-path
      description: |
        A directory containing CA certificates for HTTPS verification.
      default: ""
    - name: url
      description: Repository URL to clone from.
      type: string
    - name: revision
      description: Revision to checkout. (branch, tag, sha, ref, etc...)
      type: string
      default: ""
    - name: refspec
      description: Refspec to fetch before checking out revision.
      default: ""
    - name: submodules
      description: Initialize and fetch git submodules.
      type: string
      default: "true"
    - name: submodulePaths
      description: |
        Comma-separated list of specific submodule paths to initialize and fetch. Only submodules in the specified directories and their subdirectories will be fetched.
        Empty string fetches all submodules. Parameter "submodules" must be set to "true" to make this parameter applicable.
      type: string
      default: ""
    - name: depth
      description: Perform a shallow clone, fetching only the most recent N commits.
      type: string
      default: "1"
    - name: sslVerify
      description: Set the `http.sslVerify` global git config. Setting this to `false` is not advised unless you are sure that you trust your git remote.
      type: string
      default: "true"
    - name: crtFileName
      description: file name of mounted crt using ssl-ca-directory workspace. default value is ca-bundle.crt.
      type: string
      default: "ca-bundle.crt"
    - name: subdirectory
      description: Subdirectory inside the `output` Workspace to clone the repo into.
      type: string
      default: ""
    - name: sparseCheckoutDirectories
      description: Define the directory patterns to match or exclude when performing a sparse checkout.
      type: string
      default: ""
    - name: deleteExisting
      description: Clean out the contents of the destination directory if it already exists before cloning.
      type: string
      default: "true"
    - name: httpProxy
      description: HTTP proxy server for non-SSL requests.
      type: string
      default: ""
    - name: httpsProxy
      description: HTTPS proxy server for SSL requests.
      type: string
      default: ""
    - name: noProxy
      description: Opt out of proxying HTTP/HTTPS requests.
      type: string
      default: ""
    - name: verbose
      description: Log the commands that are executed during `git-clone`'s operation.
      type: string
      default: "true"
    - name: userFriendlyErrors
      description: |
        Print user-friendly error messages with actionable hints and reproduction commands when git operations fail. Set to "false" to disable.
      type: string
      default: "true"
    - name: gitInitImage
      description: The image providing the git-init binary that this StepAction runs.
      type: string
      default: "ghcr.io/tektoncd-catalog/git-clone:v1.5.0"
    - name: userHome
      description: |
        Absolute path to the user's home directory.
      type: string
      default: "/tekton/home"
  results:
    - name: commit
      description: The precise commit SHA that was fetched by this StepAction.
    - name: url
      description: The precise URL that was fetched by this StepAction.
    - name: committer-date
      description: The epoch timestamp of the commit that was fetched by this StepAction.
  image: "$(params.gitInitImage)"
  env:
  - name: HOME
    value: "$(params.userHome)"
  - name: PARAM_URL
    value: $(params.url)
  - name: PARAM_REVISION
    value: $(params.revision)
  - name: PARAM_REFSPEC
    value: $(params.refspec)
  - name: PARAM_SUBMODULES
    value: $(params.submodules)
  - name: PARAM_SUBMODULE_PATHS
    value: $(params.submodulePaths)
  - name: PARAM_DEPTH
    value: $(params.depth)
  - name: PARAM_SSL_VERIFY
    value: $(params.sslVerify)
  - name: PARAM_CRT_FILENAME
    value: $(params.crtFileName)
  - name: PARAM_SUBDIRECTORY
    value: $(params.subdirectory)
  - name: PARAM_DELETE_EXISTING
    value: $(params.deleteExisting)
  - name: PARAM_HTTP_PROXY
    value: $(params.httpProxy)
  - name: PARAM_HTTPS_PROXY
    value: $(params.httpsProxy)
  - name: PARAM_NO_PROXY
    value: $(params.noProxy)
  - name: PARAM_VERBOSE
    value: $(params.verbose)
  - name: PARAM_USER_FRIENDLY_ERRORS
    value: $(params.userFriendlyErrors)
  - name: PARAM_SPARSE_CHECKOUT_DIRECTORIES
    value: $(params.sparseCheckoutDirectories)
  - name: PARAM_USER_HOME
    value: $(params.userHome)
  - name: PARAM_OUTPUT_PATH
    value: $(params.output-path)
  - name: PARAM_SSH_DIRECTORY_PATH
    value: $(params.ssh-directory-path)
  - name: PARAM_BASIC_AUTH_DIRECTORY_PATH
    value: $(params.basic-auth-path)
  - name: PARAM_SSL_CA_DIRECTORY_PATH
    value: $(params.ssl-ca-directory-path)
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
  script: |
    #!/bin/sh
    set -eu

    if [ "${PARAM_VERBOSE}" = "true" ] ; then
      set -x
    fi

    # Ensure the user home directory exists (it may not in minimal images)
    mkdir -p "${PARAM_USER_HOME}"

    if [ "${PARAM_BASIC_AUTH_DIRECTORY_PATH}" != "" ] ; then
      cp "${PARAM_BASIC_AUTH_DIRECTORY_PATH}/.git-credentials" "${PARAM_USER_HOME}/.git-credentials"
      cp "${PARAM_BASIC_AUTH_DIRECTORY_PATH}/.gitconfig" "${PARAM_USER_HOME}/.gitconfig"
      chmod 400 "${PARAM_USER_HOME}/.git-credentials"
      chmod 400 "${PARAM_USER_HOME}/.gitconfig"
    fi

    if [ "${PARAM_SSH_DIRECTORY_PATH}" != "" ] ; then
      cp -R "${PARAM_SSH_DIRECTORY_PATH}" "${PARAM_USER_HOME}"/.ssh
      chmod 700 "${PARAM_USER_HOME}"/.ssh
      chmod -R 400 "${PARAM_USER_HOME}"/.ssh/*
    fi

    if [ "${PARAM_SSL_CA_DIRECTORY_PATH}" != "" ] ; then
       export GIT_SSL_CAPATH="${PARAM_SSL_CA_DIRECTORY_PATH}"
       if [ "${PARAM_CRT_FILENAME}" != "" ] ; then
          export GIT_SSL_CAINFO="${PARAM_SSL_CA_DIRECTORY_PATH}/${PARAM_CRT_FILENAME}"
       fi
    fi
    CHECKOUT_DIR="${PARAM_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"

    cleandir() {
      # Delete any existing contents of the repo directory if it exists.
      #
      # We don't just "rm -rf ${CHECKOUT_DIR}" because ${CHECKOUT_DIR} might be "/"
      # or the root of a mounted volume.
      if [ -d "${CHECKOUT_DIR}" ] ; then
        # Delete non-hidden files and directories
        rm -rf "${CHECKOUT_DIR:?}"/*
        # Delete files and directories starting with . but excluding ..
        rm -rf "${CHECKOUT_DIR}"/.[!.]*
        # Delete files and directories starting with .. plus any other character
        rm -rf "${CHECKOUT_DIR}"/..?*
      fi
    }

    if [ "${PARAM_DELETE_EXISTING}" = "true" ] ; then
      cleandir || true
    fi

    test -z "${PARAM_HTTP_PROXY}" || export HTTP_PROXY="${PARAM_HTTP_PROXY}"
    test -z "${PARAM_HTTPS_PROXY}" || export HTTPS_PROXY="${PARAM_HTTPS_PROXY}"
    test -z "${PARAM_NO_PROXY}" || export NO_PROXY="${PARAM_NO_PROXY}"

    git config --global --add safe.directory "${PARAM_OUTPUT_PATH}"

    /ko-app/git-init \
      -url="${PARAM_URL}" \
      -revision="${PARAM_REVISION}" \
      -refspec="${PARAM_REFSPEC}" \
      -path="${CHECKOUT_DIR}" \
      -sslVerify="${PARAM_SSL_VERIFY}" \
      -submodules="${PARAM_SUBMODULES}" \
      -depth="${PARAM_DEPTH}" \
      -sparseCheckoutDirectories="${PARAM_SPARSE_CHECKOUT_DIRECTORIES}" \
      -submodulePaths="${PARAM_SUBMODULE_PATHS}" \
      -userFriendlyErrors="${PARAM_USER_FRIENDLY_ERRORS}"
    cd "${CHECKOUT_DIR}"
    RESULT_SHA="$(git rev-parse HEAD)"
    EXIT_CODE="$?"
    if [ "${EXIT_CODE}" != 0 ] ; then
      exit "${EXIT_CODE}"
    fi
    RESULT_COMMITTER_DATE="$(git log -1 --pretty=%ct)"
    printf "%s" "${RESULT_COMMITTER_DATE}" > "$(step.results.committer-date.path)"
    printf "%s" "${RESULT_SHA}" > "$(step.results.commit.path)"
    printf "%s" "${PARAM_URL}" > "$(step.results.url.path)"
