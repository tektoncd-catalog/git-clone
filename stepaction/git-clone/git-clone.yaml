apiVersion: tekton.dev/v1beta1
kind: StepAction
metadata:
  annotations:
    artifacthub.io/category: integration-delivery
    artifacthub.io/changes: |
      - kind: added
        description: Added a new git-clone StepAction generated from the Task.
      - kind: added
        description: Added StepAction test coverage and integrated StepAction bundle publishing into release flow.
      - kind: added
        description: Added task signing support to the release process and included a public signing key.
      - kind: changed
        description: Updated Task and StepAction READMEs for Artifact Hub metadata and usage clarity.
      - kind: changed
        description: Added parameter and result reference tables to the StepAction README.
      - kind: fixed
        description: Fixed changelog normalization in the release script to correctly handle backticks.
    artifacthub.io/license: Apache-2.0
    artifacthub.io/links: |
      - name: support
        url: https://github.com/tektoncd-catalog/git-clone/issues
    artifacthub.io/maintainers: |
      - name: Vincent Demeester
        email: vincent@sbr.pm
      - name: vinamra28
        email: jvinamra776@gmail.com
    artifacthub.io/provider: Tekton
    tekton.dev/catalog: tektoncd.git-clone
    tekton.dev/catalog-support-tier: verified
    tekton.dev/catalog-url: https://github.com/tektoncd-catalog/git-clone
    tekton.dev/categories: Git
    tekton.dev/displayName: git clone
    tekton.dev/pipelines.minVersion: 1.0.0
    tekton.dev/platforms: linux/amd64,linux/s390x,linux/ppc64le,linux/arm64
    tekton.dev/signature: MEUCIDkryxW5p1Gnz7Tm/+PEvcBU/Jf1AbwoUAN15f5xrCvNAiEAuP2EdMZcX6VrkPJqfNBAPiKVp6PW+IVM2n7zo/NyDZU=
    tekton.dev/tags: git
  labels:
    app.kubernetes.io/version: 1.6.0
  name: git-clone
spec:
  description: This StepAction clones a git repository for use by other steps in your
    Pipeline. It clones a repo from the provided url into the output path. By default
    the repo will be cloned into the root of the provided path. You can clone into
    a subdirectory by setting this StepAction's subdirectory param. It also supports
    sparse checkouts. To perform a sparse checkout, pass a list of comma separated
    directory patterns to this StepAction's sparseCheckoutDirectories param.
  params:
  - description: The git repo will be cloned onto this path.
    name: output-path
    type: string
  - default: ""
    description: |
      A .ssh directory with private key, known_hosts, config, etc.
    name: ssh-directory-path
  - default: ""
    description: |
      A directory path containing a .gitconfig and .git-credentials file.
    name: basic-auth-path
  - default: ""
    description: |
      A directory containing CA certificates for HTTPS verification.
    name: ssl-ca-directory-path
  - description: Repository URL to clone from.
    name: url
    type: string
  - default: ""
    description: Revision to checkout. (branch, tag, sha, ref, etc...)
    name: revision
    type: string
  - default: ""
    description: Refspec to fetch before checking out revision.
    name: refspec
  - default: "true"
    description: Initialize and fetch git submodules.
    name: submodules
    type: string
  - default: ""
    description: |
      Comma-separated list of specific submodule paths to initialize and fetch. Only submodules in the specified directories and their subdirectories will be fetched.
      Empty string fetches all submodules. Parameter "submodules" must be set to "true" to make this parameter applicable.
    name: submodulePaths
    type: string
  - default: "1"
    description: Perform a shallow clone, fetching only the most recent N commits.
    name: depth
    type: string
  - default: "true"
    description: Set the `http.sslVerify` global git config. Setting this to `false`
      is not advised unless you are sure that you trust your git remote.
    name: sslVerify
    type: string
  - default: ca-bundle.crt
    description: file name of mounted crt using ssl-ca-directory workspace. default
      value is ca-bundle.crt.
    name: crtFileName
    type: string
  - default: ""
    description: Subdirectory inside the `output` Workspace to clone the repo into.
    name: subdirectory
    type: string
  - default: ""
    description: Define the directory patterns to match or exclude when performing
      a sparse checkout.
    name: sparseCheckoutDirectories
    type: string
  - default: "true"
    description: Clean out the contents of the destination directory if it already
      exists before cloning.
    name: deleteExisting
    type: string
  - default: ""
    description: HTTP proxy server for non-SSL requests.
    name: httpProxy
    type: string
  - default: ""
    description: HTTPS proxy server for SSL requests.
    name: httpsProxy
    type: string
  - default: ""
    description: Opt out of proxying HTTP/HTTPS requests.
    name: noProxy
    type: string
  - default: "true"
    description: Log the commands that are executed during `git-clone`'s operation.
    name: verbose
    type: string
  - default: "true"
    description: |
      Print user-friendly error messages with actionable hints and reproduction commands when git operations fail. Set to "false" to disable.
    name: userFriendlyErrors
    type: string
  - default: ghcr.io/tektoncd-catalog/git-clone:v1.6.0
    description: The image providing the git-init binary that this StepAction runs.
    name: gitInitImage
    type: string
  - default: /tekton/home
    description: |
      Absolute path to the user's home directory.
    name: userHome
    type: string
  results:
  - description: The precise commit SHA that was fetched by this StepAction.
    name: commit
  - description: The precise URL that was fetched by this StepAction.
    name: url
  - description: The epoch timestamp of the commit that was fetched by this StepAction.
    name: committer-date
